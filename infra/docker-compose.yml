services:
  sankofa:
    image: sankofa/engine:latest
    build:
      context: ../../
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password123
      CLICKHOUSE_DB: default
    volumes:
      - ./sankofa_data:/app/data
    depends_on:
      clickhouse:
        condition: service_healthy
    profiles:
      - full # Only starts when you run: docker compose --profile full up

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # Native
    volumes:
      - ch_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password123
      CLICKHOUSE_DB: default
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: [ "CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

volumes:
  ch_data:
