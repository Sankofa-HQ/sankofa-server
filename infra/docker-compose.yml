services:
  sankofa:
    image: sankofa/engine:latest
    build:
      context: ../engine
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      CLICKHOUSE_ADDR: clickhouse:9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password123
      CLICKHOUSE_DB: default
    volumes:
      - ./sankofa_data:/app/data
    depends_on:
      - clickhouse

  clickhouse:
    image: clickhouse/clickhouse-server
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # Native
    volumes:
      - ./ch_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: password123
      CLICKHOUSE_DB: default
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
